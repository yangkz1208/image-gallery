<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>私人图片库 • yangkz1208</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>
  <!-- 密码页 -->
  <div id="overlay">
    <div class="login-box">
      <h1>私人图库</h1>
      <input id="pw" type="password" placeholder="输入密码">
      <button onclick="checkPassword()">回车登录</button>
      <div class="links">
        <span onclick="changePassword()">更改密码</span>
        <span onclick="guestMode()">访客模式</span>
      </div>
      <div id="quoteMain"></div>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="main" class="hidden">
    <header>
      <span id="imgCount">图片总数：128</span>
      <span id="time"></span>
      <div id="dailyQuote"></div>
      <button onclick="logout()">退出</button>
    </header>
    <div id="folders" class="folder-grid"></div>
  </div>
</body>
</html>
