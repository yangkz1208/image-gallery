<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的高颜值图片库</title>
    <!-- 引入Tailwind CSS（快速做美观UI，无需手写大量CSS） -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入图标库（上传/下载/分类图标） -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 引入自定义样式（含壁纸配置） -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gray-100">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">我的图片库</h1>
            <div class="flex items-center gap-4">
                <!-- 分类选择下拉框 -->
               <select id="categorySelect" class="px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    <option value="all">所有分类</option>
    <option value="他人">他人</option>
    <option value="好图">好图</option>
    <option value="网图">网图</option>
    <option value="花草">花草</option>
    <option value="风景">风景</option>
</select>
              <!-- 上传按钮 -->
                <label for="fileInput" class="cursor-pointer bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    <i class="fa fa-upload mr-2"></i>上传图片
                </label>
                <input type="file" id="fileInput" class="hidden" multiple accept="image/*">
            </div>
        </div>
    </header>

    <!-- 拖传区域 -->
    <div id="dropArea" class="container mx-auto px-4 py-8 border-2 border-dashed border-blue-500 rounded-lg my-6 text-center py-16 hover:bg-blue-50 transition">
        <i class="fa fa-cloud-upload text-5xl text-blue-500 mb-4"></i>
        <p class="text-xl text-gray-700">拖入图片到此处上传，或点击上方「上传图片」按钮</p>
        <p class="text-sm text-gray-500 mt-2">支持JPG/PNG/WebP格式，单张不超过10MB</p>
    </div>

    <!-- 图片展示区域 -->
    <div class="container mx-auto px-4">
        <div id="imageGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 my-8">
            <!-- 图片会通过JS动态加载 -->
            <div class="text-center text-gray-500 py-10">
                暂无图片，上传后将显示在这里
            </div>
        </div>
    </div>

    <!-- 大图预览弹窗 -->
    <div id="previewModal" class="fixed inset-0 bg-black/80 z-90 hidden flex items-center justify-center">
        <button id="closeModal" class="absolute top-4 right-6 text-white text-4xl hover:text-gray-300 transition">×</button>
        <img id="previewImage" class="max-w-[90%] max-h-[90vh]" src="" alt="大图预览">
    </div>

    <!-- 引入核心功能JS -->
    <script src="script.js"></script>
</body>
</html>
