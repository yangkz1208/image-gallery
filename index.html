<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人图片库</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body>
  <div class="bg-container"></div>

  <!-- 登录页 -->
  <div id="login-page" class="page active">
    <div class="daily-word">加载中...</div>
    <div class="password-container">
      <input type="password" id="password-input" placeholder="请输入密码" class="password-input">
      <div class="password-actions">
        <span id="visitor-mode" class="action-text">访客模式</span>
      </div>
    </div>
  </div>

  <!-- 主内容页 -->
  <div id="main-page" class="page">
    <div class="top-bar">
      <span id="total-images">图片总数：0</span>
      <span id="current-time">加载中...</span>
    </div>
    <div class="top-image-container">
      <img id="top-specified-image" src="" alt="指定图片" class="top-image">
    </div>
    <div class="folders-grid">
  <div class="folder-card" data-folder="他人"><div class="folder-name">他人</div></div>
  <div class="folder-card" data-folder="好图"><div class="folder-name">好图</div></div>
  <div class="folder-card" data-folder="网图"><div class="folder-name">网图</div></div>
  <div class="folder-card" data-folder="花草"><div class="folder-name">花草</div></div>
  <div class="folder-card" data-folder="风景"><div class="folder-name">风景</div></div>
</div>
    <div id="folder-detail" class="folder-detail">
      <button id="back-btn" class="back-btn">← 返回</button>
      <div class="folder-title" id="folder-title"># 文件夹A</div>
      <div class="images-grid" id="images-grid"></div>
      <div id="manage-panel" class="manage-panel">
        <button class="manage-btn" id="download-selected">下载</button>
        <button class="manage-btn" id="delete-selected">删除</button>
        <button class="manage-btn" id="select-all">全选</button>
        <button class="manage-btn" id="lock-selected">锁定</button>
        <button class="manage-btn" id="cancel-select">取消</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
